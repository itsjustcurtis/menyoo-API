name: Update Supporters

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour (UTC)

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch supporter data
        env:
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          PATREON_CAMPAIGN_ID: ${{ secrets.PATREON_CAMPAIGN_ID }}
        run: node scripts/fetch-supporters.js

      - name: Rotate refresh token secret if changed
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f new_refresh_token.txt ]; then
            gh secret set REFRESH_TOKEN --body "$(cat new_refresh_token.txt)"
            rm new_refresh_token.txt
            echo "Refresh token secret updated."
          fi
        
      - name: Commit updated supporters.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/supporters.json
          git diff --staged --quiet || git commit -m "Update supporter data"
          git push
