name: Update Supporters

on:
  workflow_dispatch:   # manual "Run workflow" button, no schedule yet

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch supporter data
        env:
          PATREON_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          PATREON_CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          PATREON_REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          PATREON_CAMPAIGN_ID: ${{ secrets.PATREON_CAMPAIGN_ID }}
        run: node scripts/fetch-supporters.js
        
      - name: Commit updated supporters.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/supporters.json
          git diff --staged --quiet || git commit -m "Update supporter data"
          git push
